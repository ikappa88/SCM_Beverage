services:
  db:
    image: postgres:15
    container_name: scm_beverage_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-scm_beverage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scm_user} -d ${POSTGRES_DB:-scm_beverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: scm_beverage_backend
    env_file:
      - ./backend/.env
    environment:
      # Docker内ではDBサービス名で接続 (backend/.envのlocalhostを上書き)
      DATABASE_URL: postgresql://scm_user:${POSTGRES_PASSWORD}@db:5432/scm_beverage
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
