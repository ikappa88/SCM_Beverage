services:
  db:
    image: postgres:15
    container_name: scm_beverage_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-scm_beverage}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scm_user} -d ${POSTGRES_DB:-scm_beverage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: scm_beverage_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
```

### `docker-compose.example.env` を新規作成
**パス：** `C:\Users\je_is\python_notebook\Git_Folder\SCM_Beverage\docker-compose.example.env`
```
# docker-compose用環境変数サンプル
# 本番環境では .env にコピーして適切な値を設定してください
POSTGRES_USER=scm_user
POSTGRES_PASSWORD=your_secure_password_here
POSTGRES_DB=scm_beverage
```

### `.gitignore` に追記
末尾に以下を追加してください：
```
# 本番環境変数
docker-compose.env
.env.production
```

